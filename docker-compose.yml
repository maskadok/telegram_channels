services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram_analytics_postgres
    environment:
      POSTGRES_DB: telegram_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: telegram_analytics_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/telegram_analytics
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE:-}
      TELETHON_SESSION_NAME: ${TELETHON_SESSION_NAME:-telegram_user}
      TELETHON_SESSION_DIR: /app/sessions
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-120}
      TELEGRAM_CHANNELS: ${TELEGRAM_CHANNELS:-tproger,habr_com}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FETCH_LIMIT: ${FETCH_LIMIT:-30}
      TELEGRAM_REQUEST_PAUSE_SECONDS: ${TELEGRAM_REQUEST_PAUSE_SECONDS:-3}
    command:
      [
        "sh",
        "-c",
        "until python -c \"import os, psycopg; psycopg.connect(os.environ['DATABASE_URL'].replace('+psycopg', '')).close()\"; do echo 'waiting for postgres'; sleep 2; done; alembic upgrade head && uvicorn app.main:app --host \"$$APP_HOST\" --port \"$$APP_PORT\""
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ${TELETHON_SESSION_HOST_DIR:-C:/telegram_analytics_sessions}:/app/sessions
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: telegram_analytics_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
